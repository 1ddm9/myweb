<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泡茶实验室</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Ma Shan Zheng', 'ZCOOL KuaiLe', 'Noto Serif SC', cursive;
      /* 泡茶页全局背景：bg-scroll.jpg */
      background: url('images/bg-scroll.jpg') center/cover no-repeat fixed;
      overflow-x: hidden;
    }
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 40px;
      background: rgba(60,40,20,0.85);
      backdrop-filter: blur(10px);
      color: #e5d5b7;
    }
    .nav-brand { font-size: 1.8rem; }
    .nav-links a { color: #e5d5b7; text-decoration: none; margin-left: 30px; }
    .nav-links a:hover { color: #d4af7a; }

    .game-container {
      display: flex;
      max-width: 1100px;
      margin: 30px auto;
      gap: 30px;
      padding: 0 20px;
    }
    .scene {
      flex: 2;
      background: rgba(255, 255, 242, 0.85); /* 半透明，露出背景 */
      border-radius: 30px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      min-height: 500px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .side-panel {
      flex: 1;
      background: rgba(255, 255, 242, 0.85);
      border-radius: 30px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .step-title { font-size: 2rem; color: #5a3e2b; margin-bottom: 15px; }
    .instruction { font-size: 1.2rem; color: #6b5a4a; margin-bottom: 20px; min-height: 80px; }
    .temp-slider {
      width: 100%; margin: 15px 0;
      appearance: none; -webkit-appearance: none; -moz-appearance: none;
      height: 8px; background: #d9c9a8; border-radius: 5px; outline: none;
    }
    .temp-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 25px; height: 25px; background: #b68b5c;
      border-radius: 50%; cursor: pointer; border: 2px solid #5a3e2b;
    }
    .temp-slider::-moz-range-thumb {
      width: 25px; height: 25px; background: #b68b5c;
      border-radius: 50%; cursor: pointer; border: 2px solid #5a3e2b;
    }

    .tea-item {
      width: 140px; cursor: grab; text-align: center; transition: transform 0.2s;
      background: rgba(255,255,242,0.7); border-radius: 12px; padding: 5px;
    }
    .tea-item img { width: 100%; min-width: 120px; height: auto; display: block; }
    .tea-item:active { cursor: grabbing; }

    .scene-img {
      width: 200px; height: auto; user-select: none; display: block;
    }

    .drop-overlay {
      border: 3px dashed #a68b6f; border-radius: 20px;
      background: rgba(200,180,140,0.1); display: flex;
      align-items: center; justify-content: center;
      color: #a68b6f; font-weight: bold; transition: 0.3s;
    }
    .drop-overlay.hover { background: rgba(180,140,90,0.3); border-color: #7b5e3b; }

    .btn {
      padding: 10px 30px; background: #d4af7a;
      border: 2px solid #8b6f4c; border-radius: 30px;
      color: #3e2e1f; font-size: 1.1rem; cursor: pointer;
      transition: 0.2s; box-shadow: 2px 2px 0 #6b5a45;
    }
    .btn:active { box-shadow: 0px 0px 0 #6b5a45; transform: translate(2px,2px); }
    .button-group { display: flex; gap: 20px; margin-top: 20px; justify-content: center; }
    .hidden { display: none !important; }
    .complete-area { text-align: center; margin-top: 50px; }

    /* 拖尾粒子 */
    .trail-particle {
      position: absolute; width: 26px; height: 26px;
      background-image: url('images/tea-leaf-particle.png');
      background-size: contain; background-repeat: no-repeat;
      pointer-events: none; z-index: 1000;
      animation: fadeDown 1.2s forwards;
    }
    @keyframes fadeDown {
      0% { opacity: 0.9; transform: translate(0,0) rotate(0deg); }
      100% { opacity: 0; transform: translate(30px,80px) rotate(120deg); }
    }

    /* 杯内茶叶 */
    .tea-in-cup {
      position: absolute;
      left: 50%; top: 52%;
      transform: translate(-50%, -50%);
      width: 80px; height: auto;
      z-index: 3; opacity: 0;
      animation: teaIn 0.6s forwards;
    }
    @keyframes teaIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* 杯子容器 */
    .cup-wrapper {
      position: absolute;
      left: 42%; top: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
    }

    /* 圆形水面 */
    .water-level {
      position: absolute;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%) scale(0);
      width: 80px;
      height: 80px;
      background: rgba(173, 216, 230, 0.55);
      border-radius: 50%;
      z-index: 2;
      transition: transform 1.2s ease;
    }
    .water-level.active { transform: translate(-50%, -50%) scale(1); }

    /* 出汤场景 */
    .pour-scene {
      position: relative;
      width: 100%;
      height: 400px;
    }
    .source-cup, .target-cup {
      position: absolute;
      transition: all 0.8s ease;
    }
    .source-cup {
      left: 32%;
      top: 45%;
      transform: translate(-50%, -50%);
      z-index: 3;
      cursor: pointer;
    }
    .source-cup img { width: 160px; }
    .source-cup.tilt-right {
      transform: translate(-50%, -50%) rotate(25deg);
    }
    .target-cup {
      left: 65%;
      top: 45%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }
    .target-cup img {
      width: 140px;
      opacity: 1;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🍃 新火试茶</div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="experiment.html" style="color:#d4af7a;">泡茶实验室</a>
      <a href="knowledge.html">茶知道</a>
    </div>
  </nav>

  <div id="selectTea" class="game-container">
    <div style="width:100%; text-align:center;">
      <h2 style="color:#4a3520; margin-bottom:30px;">选一款茶，开始冲泡吧</h2>
      <div style="display:flex; justify-content:center; gap:30px; flex-wrap:wrap;" id="teaCards"></div>
    </div>
  </div>

  <div id="brewArea" class="game-container hidden">
    <div class="scene" id="scene"></div>
    <div class="side-panel">
      <div class="step-title" id="stepTitle">温杯</div>
      <div class="instruction" id="instruction">点击热水壶温热茶具</div>
      <div id="extraControls"></div>
      <div class="button-group">
        <button class="btn" id="actionBtn">下一步</button>
        <button class="btn hidden" id="resetBtn">重新开始</button>
      </div>
    </div>
  </div>

  <div id="completeArea" class="complete-area hidden">
    <h2>冲泡完成</h2>
    <img id="completeImg" src="" alt="成品茶" style="width:200px; margin:20px;">
    <p id="completeMsg" style="font-size:1.5rem;"></p>
    <div class="button-group" style="margin-top:30px;">
      <button class="btn" onclick="restartSame()">再泡一次</button>
      <button class="btn" onclick="backToSelect()">选其他茶</button>
    </div>
  </div>

  <script>
    const teas = [
      { id: 'green', name: '绿茶', img: 'images/tea-green.png', finishImg: 'images/green-fin.png',
        temp: '80-85℃', method: 'top-drop',
        steps: [
          { title: '温杯', instr: '点击热水壶，温热盖碗', type: 'clickKettle' },
          { title: '投茶', instr: '将茶叶拖到盖碗中（上投法）', type: 'dragTea', targetWater: true },
          { title: '注水', instr: '调整水温至80-85℃，点击注水', type: 'tempPour', idealTemp: 82 },
          { title: '出汤', instr: '点击左边的泡茶杯，将茶汤倒入右边的茶杯', type: 'clickTeapot' },
          { title: '品鉴', instr: '点击茶杯，品味香茗', type: 'clickCup' }
        ],
        completeMsg: '“清汤绿叶，一如少年”' },
      { id: 'white', name: '白茶', img: 'images/tea-white.png', finishImg: 'images/white-fin.png',
        temp: '85-90℃', method: 'mid-drop',
        steps: [
          { title: '温杯', instr: '点击热水壶温热茶具', type: 'clickKettle' },
          { title: '投茶', instr: '先拖入茶叶，再点击水壶加满水（中投法）', type: 'dragTeaThenPour', targetWater: false },
          { title: '注水', instr: '水温85-90℃，滑块调节后注水', type: 'tempPour', idealTemp: 88 },
          { title: '出汤', instr: '点击左边的泡茶杯，将茶汤倒入右边的茶杯', type: 'clickTeapot' },
          { title: '品鉴', instr: '点击茶杯品饮', type: 'clickCup' }
        ],
        completeMsg: '“白毫银针，素心如雪”' },
      { id: 'oolong', name: '乌龙茶', img: 'images/tea-oolong.png', finishImg: 'images/oolong-fin.png',
        temp: '95-100℃', method: 'bottom-drop',
        steps: [
          { title: '温杯', instr: '点击热水壶温杯', type: 'clickKettle' },
          { title: '投茶', instr: '先拖入茶叶，再点击水壶注沸水（下投法）', type: 'dragTeaThenPour', targetWater: false },
          { title: '注水', instr: '沸水高冲，100℃', type: 'tempPour', idealTemp: 100 },
          { title: '出汤', instr: '点击左边的泡茶杯，将茶汤倒入右边的茶杯', type: 'clickTeapot' },
          { title: '品鉴', instr: '嗅香品饮', type: 'clickCup' }
        ],
        completeMsg: '“岩骨花香，铁汉柔情”' },
      { id: 'yellow', name: '黄茶', img: 'images/tea-yellow.png', finishImg: 'images/yellow-fin.png',
        temp: '85℃', method: 'mid-drop',
        steps: [
          { title: '温杯', instr: '点击热水壶温杯', type: 'clickKettle' },
          { title: '投茶', instr: '先拖入茶叶，再点击水壶注水（中投法）', type: 'dragTeaThenPour', targetWater: false },
          { title: '注水', instr: '水温85℃，轻柔注水', type: 'tempPour', idealTemp: 85 },
          { title: '出汤', instr: '点击左边的泡茶杯，将茶汤倒入右边的茶杯', type: 'clickTeapot' },
          { title: '品鉴', instr: '品味甜醇', type: 'clickCup' }
        ],
        completeMsg: '“闷黄点化，温润如玉”' },
      { id: 'black', name: '红茶', img: 'images/tea-black.png', finishImg: 'images/black-fin.png',
        temp: '95℃', method: 'bottom-drop',
        steps: [
          { title: '温杯', instr: '点击热水壶温杯', type: 'clickKettle' },
          { title: '投茶', instr: '先拖入茶叶，再点击水壶注沸水', type: 'dragTeaThenPour', targetWater: false },
          { title: '注水', instr: '水温95℃', type: 'tempPour', idealTemp: 95 },
          { title: '出汤', instr: '点击左边的泡茶杯，将茶汤倒入右边的茶杯', type: 'clickTeapot' },
          { title: '品鉴', instr: '甜润暖心', type: 'clickCup' }
        ],
        completeMsg: '“红汤金圈，温暖人间”' },
      { id: 'dark', name: '黑茶', img: 'images/tea-dark.png', finishImg: 'images/dark-fin.png',
        temp: '100℃', method: 'bottom-drop-rinse',
        steps: [
          { title: '温杯', instr: '点击热水壶温杯', type: 'clickKettle' },
          { title: '润茶', instr: '拖入茶叶后，点击水壶少量注水，再倒掉', type: 'dragTeaRinse' },
          { title: '注水', instr: '正式注满沸水', type: 'tempPour', idealTemp: 100 },
          { title: '出汤', instr: '点击左边的泡茶杯，将茶汤倒入右边的茶杯', type: 'clickTeapot' },
          { title: '品鉴', instr: '陈香醇厚', type: 'clickCup' }
        ],
        completeMsg: '“岁月陈香，厚德载物”' }
    ];

    let currentTea = null;
    let currentStepIndex = 0;
    let stepCompleted = false;

    const selectDiv = document.getElementById('selectTea');
    const brewDiv = document.getElementById('brewArea');
    const completeDiv = document.getElementById('completeArea');
    const sceneDiv = document.getElementById('scene');
    const stepTitleEl = document.getElementById('stepTitle');
    const instructionEl = document.getElementById('instruction');
    const actionBtn = document.getElementById('actionBtn');
    const resetBtn = document.getElementById('resetBtn');
    const extraControls = document.getElementById('extraControls');

    let lastTrailTime = 0;
    const TRAIL_INTERVAL = 150;

    function spawnTrail(x, y) {
      const now = Date.now();
      if (now - lastTrailTime < TRAIL_INTERVAL) return;
      lastTrailTime = now;
      const particle = document.createElement('div');
      particle.className = 'trail-particle';
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      document.body.appendChild(particle);
      particle.addEventListener('animationend', () => particle.remove());
    }

    function initSelect() {
      const container = document.getElementById('teaCards');
      container.innerHTML = '';
      teas.forEach(tea => {
        const card = document.createElement('div');
        card.className = 'tea-item';
        card.innerHTML = `<img src="${tea.img}" alt="${tea.name}"><p style="margin-top:5px; color:#4a3520;">${tea.name}</p>`;
        card.addEventListener('click', () => startBrew(tea));
        container.appendChild(card);
      });
    }

    function startBrew(tea) {
      currentTea = tea;
      currentStepIndex = 0;
      stepCompleted = false;
      selectDiv.classList.add('hidden');
      brewDiv.classList.remove('hidden');
      completeDiv.classList.add('hidden');
      lastTrailTime = 0;
      executeStep();
    }

    function executeStep() {
      const step = currentTea.steps[currentStepIndex];
      stepTitleEl.textContent = step.title;
      instructionEl.textContent = step.instr;
      extraControls.innerHTML = '';
      actionBtn.classList.remove('hidden');
      actionBtn.textContent = '下一步';
      actionBtn.onclick = null;
      sceneDiv.innerHTML = '';

      // 温杯
      if (step.type === 'clickKettle') {
        sceneDiv.innerHTML = `
          <div style="position:relative; width:100%; height:400px;">
            <img src="images/teapot-empty.png" id="teapot" class="scene-img" style="position:absolute; left:42%; top:50%; transform:translate(-50%,-50%); width:250px; z-index:1;">
            <img src="images/kettle.png" id="kettle" class="scene-img" style="position:absolute; left:60%; top:38%; transform:translate(-50%,-50%); width:200px; z-index:2; cursor:pointer;">
          </div>`;
        document.getElementById('kettle').addEventListener('click', function() {
          const kettle = this;
          kettle.style.transition = '0.3s';
          kettle.style.transform = 'translate(-50%,-50%) rotate(-30deg)';
          setTimeout(() => {
            kettle.style.transform = 'translate(-50%,-50%) rotate(0deg)';
            stepCompleted = true;
            instructionEl.textContent = '温杯完成！点击下一步';
          }, 800);
        });
      }

      // 投茶
      else if (step.type === 'dragTea' || step.type === 'dragTeaThenPour' || step.type === 'dragTeaRinse') {
        sceneDiv.innerHTML = `
          <div id="dragContainer" style="position:relative; width:100%; height:400px;">
            <div id="cupWrapper" class="cup-wrapper" style="z-index:1; ${step.targetWater ? 'background: rgba(173,216,230,0.4);' : ''}">
              <img src="images/teacup-open.png" class="scene-img" style="width:200px; position:relative; z-index:1;">
              <div class="drop-overlay" id="dropZone" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:180px; height:180px; z-index:3;">拖放茶叶</div>
            </div>
            <img src="${currentTea.img}" id="draggableTea" draggable="true" style="position:absolute; left:5%; top:50%; transform:translateY(-50%); width:120px; height:auto; cursor:grab; z-index:4;">
          </div>`;

        const dropZone = document.getElementById('dropZone');
        const teaItem = document.getElementById('draggableTea');
        const cupWrapper = document.getElementById('cupWrapper');

        teaItem.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', 'tea');
          e.dataTransfer.effectAllowed = 'move';
          teaItem.style.opacity = '0.5';
          document.addEventListener('dragover', trailHandler);
        });
        teaItem.addEventListener('dragend', e => {
          teaItem.style.opacity = '1';
          document.removeEventListener('dragover', trailHandler);
        });

        function trailHandler(e) {
          e.preventDefault();
          spawnTrail(e.clientX, e.clientY);
        }

        dropZone.addEventListener('dragover', e => {
          e.preventDefault(); e.dataTransfer.dropEffect = 'move'; dropZone.classList.add('hover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));

        dropZone.addEventListener('drop', e => {
          e.preventDefault();
          dropZone.classList.remove('hover');
          document.removeEventListener('dragover', trailHandler);
          teaItem.remove();
          dropZone.remove();
          stepCompleted = true;
          instructionEl.textContent = '投茶成功！点击下一步';

          const teaInCup = document.createElement('img');
          teaInCup.src = currentTea.img;
          teaInCup.className = 'tea-in-cup';
          cupWrapper.appendChild(teaInCup);

          if (step.type === 'dragTeaThenPour' || step.type === 'dragTeaRinse') {
            const kettle = document.createElement('img');
            kettle.src = 'images/kettle.png';
            kettle.className = 'scene-img';
            kettle.style.position = 'absolute';
            kettle.style.left = '60%'; kettle.style.top = '38%';
            kettle.style.transform = 'translate(-50%,-50%)';
            kettle.style.width = '160px';
            kettle.style.cursor = 'pointer';
            kettle.style.zIndex = '5';
            kettle.addEventListener('click', () => {
              kettle.style.transition = '0.3s';
              kettle.style.transform = 'translate(-50%,-50%) rotate(-30deg)';
              setTimeout(() => {
                kettle.style.transform = 'translate(-50%,-50%) rotate(0deg)';
                instructionEl.textContent = '注水完成！点击下一步';
              }, 800);
            });
            document.getElementById('dragContainer').appendChild(kettle);
          }
        });
      }

      // 控温注水
      else if (step.type === 'tempPour') {
        sceneDiv.innerHTML = `
          <div style="position:relative; width:100%; height:400px;">
            <div class="cup-wrapper" style="z-index:1;">
              <img src="images/teacup-open.png" class="scene-img" style="width:200px; position:relative; z-index:1;">
              <div id="waterLevel" class="water-level"></div>
              <img src="${currentTea.img}" class="tea-in-cup" style="opacity:1; width:110px; top:52%; z-index:3;">
            </div>
            <img src="images/kettle.png" id="pourKettle" class="scene-img" style="position:absolute; left:60%; top:38%; transform:translate(-50%,-50%); cursor:pointer; z-index:5;">
          </div>`;
        extraControls.innerHTML = `
          <p>目标水温：${step.idealTemp}℃</p>
          <input type="range" class="temp-slider" id="tempSlider" min="70" max="100" value="100">
          <span id="tempDisplay">100℃</span>`;

        const tempSlider = document.getElementById('tempSlider');
        const tempDisplay = document.getElementById('tempDisplay');
        tempSlider.addEventListener('input', e => { tempDisplay.textContent = e.target.value + '℃'; });

        document.getElementById('pourKettle').addEventListener('click', () => {
          const currentTemp = parseInt(tempSlider.value);
          if (Math.abs(currentTemp - step.idealTemp) <= 5) {
            const kettle = document.getElementById('pourKettle');
            kettle.style.transition = '0.3s';
            kettle.style.transform = 'translate(-50%,-50%) rotate(-30deg)';
            document.getElementById('waterLevel').classList.add('active');
            setTimeout(() => {
              kettle.style.transform = 'translate(-50%,-50%) rotate(0deg)';
              stepCompleted = true;
              instructionEl.textContent = '水温刚好，注水完成！';
            }, 800);
          } else {
            alert('水温不太对哦，再调整一下～');
          }
        });
      }

      // 出汤
      else if (step.type === 'clickTeapot') {
        sceneDiv.innerHTML = `
          <div class="pour-scene">
            <div class="source-cup" id="sourceCup" title="点击倒茶">
              <img src="images/teacup-open.png" style="width:160px;">
              <div class="water-level active" style="position:absolute; left:50%; top:60%; transform:translate(-50%,-50%); width:70px; height:70px;"></div>
              <img src="${currentTea.img}" style="position:absolute; left:50%; top:52%; transform:translate(-50%,-50%); width:70px; z-index:3;">
            </div>
            <div class="target-cup" id="targetCup">
              <img src="images/cup-empty.png" id="targetImg" style="width:140px;">
            </div>
          </div>`;
        document.getElementById('sourceCup').addEventListener('click', function() {
          if (stepCompleted) return;
          document.getElementById('sourceCup').classList.add('tilt-right');
          setTimeout(() => {
            document.getElementById('targetImg').src = 'images/cup-full.png';
          }, 400);
          setTimeout(() => {
            const water = document.querySelector('#sourceCup .water-level');
            if (water) water.style.display = 'none';
            stepCompleted = true;
            instructionEl.textContent = '出汤完成！点击下一步';
          }, 1000);
        });
      }

      // 品鉴
      else if (step.type === 'clickCup') {
        sceneDiv.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%;"><img src="images/cup-full.png" class="scene-img" id="cupDrink" style="cursor:pointer; width:200px;"></div>`;
        document.getElementById('cupDrink').addEventListener('click', () => {
          const cup = document.getElementById('cupDrink');
          cup.style.transition = '0.3s'; cup.style.transform = 'translateY(-20px)';
          setTimeout(() => {
            cup.style.transform = 'translateY(0)';
            stepCompleted = true;
            instructionEl.textContent = '好茶！点击查看寄语';
          }, 600);
        });
      }

      actionBtn.onclick = () => {
        if (!stepCompleted) {
          alert('请先完成当前操作～');
          return;
        }
        currentStepIndex++;
        stepCompleted = false;
        if (currentStepIndex < currentTea.steps.length) executeStep();
        else {
          brewDiv.classList.add('hidden');
          completeDiv.classList.remove('hidden');
          document.getElementById('completeImg').src = currentTea.finishImg;
          document.getElementById('completeMsg').textContent = currentTea.completeMsg;
        }
      };
    }

    function restartSame() {
      currentStepIndex = 0; stepCompleted = false;
      brewDiv.classList.remove('hidden'); completeDiv.classList.add('hidden');
      lastTrailTime = 0;
      executeStep();
    }
    function backToSelect() {
      selectDiv.classList.remove('hidden'); brewDiv.classList.add('hidden'); completeDiv.classList.add('hidden');
      currentTea = null;
    }
    resetBtn.addEventListener('click', restartSame);
    initSelect();
  </script>
</body>
</html>
